# This workflow completes the story by delivering the saved package.
# It starts after the build workflow finishes successfully.
name: Deploy Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

# 🚨 REQUIRED: This grants the workflow permission to request the OIDC token
permissions:
  id-token: write
  contents: read

env:
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"
  ECR_REPOSITORY: github-action-course/my-app-repo
  IMAGE_TAG: latest
  SERVER_HOST: 44.213.116.175
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: us-east-1
  USERNAME: ubuntu
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

jobs:
  deploy-package:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Remote Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        env:
          # Pass your GitHub Action environment variables to the SSH action
          AWS_ACCOUNT_ID: ${AWS_ACCOUNT_ID}
          AWS_REGION: ${AWS_REGION}
          ECR_REPOSITORY: ${ECR_REPOSITORY}
          IMAGE_TAG: ${IMAGE_TAG}
          CONTAINER_NAME: ${CONTAINER_NAME}
          APP_PORT: ${APP_PORT}
        with:
          host: ${SERVER_HOST}
          username: ${USERNAME}
          key: ${SSH_PRIVATE_KEY}
          # Explicitly tell the action to send these env vars to the server
          envs: AWS_ACCOUNT_ID,AWS_REGION,ECR_REPOSITORY,IMAGE_TAG,CONTAINER_NAME,APP_PORT
          script: |
            ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

            echo "Pulling image..."
            docker pull "$ECR_REGISTRY/${ECR_REPOSITORY}:$IMAGE_TAG"

            echo "Stopping old container..."
            docker rm -f "${CONTAINER_NAME}" || true

            echo "Starting new container..."
            docker run -d \
              --name "${CONTAINER_NAME}" \
              -p "${APP_PORT}:8000" \
              "$ECR_REGISTRY/${ECR_REPOSITORY}:${IMAGE_TAG}"

            echo "Running smoke test..."
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
                echo "App is healthy!"
                exit 0
              fi
              echo "Waiting for app to become ready..."
              sleep 2
            done

            echo "App did not become ready in time."
            # If it fails, print logs for debugging, then exit with error
            docker logs "${CONTAINER_NAME}"
            exit 1

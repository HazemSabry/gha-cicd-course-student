# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  pull_request:
    branches: [main]
  workflow_dispatch:

    # 🚨 REQUIRED: This grants the workflow permission to request the OIDC token
permissions:
  id-token: write
  contents: read

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

  build-and-push:
    runs-on: ubuntu-latest

    needs: run-tests
    env:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Authenticate to AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHub_Action_Course
          aws-region: us-east-1

      # Log in to ECR (AWS now knows who you are!)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push (Same as before)
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: github-action-course/my-app-repo
          IMAGE_TAG: latest
        run: docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

        # 3. Scan the local image with Trivy BEFORE pushing
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # Build and push (Same as before)
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: github-action-course/my-app-repo
          IMAGE_TAG: latest
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
